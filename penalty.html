<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
    <title>Word Game - Penalty Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .penalty-field {
            position: relative;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            background: linear-gradient(to bottom, #4CAF50 0%, #388E3C 100%);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 5px solid #fff;
        }
        .penalty-goal {
            position: relative;
            width: 100%;
            height: 120px;
            background: #fff;
            border: 4px solid #333;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
        }
        .penalty-goal-opponent {
            margin-bottom: 30px;
        }
        .penalty-goal-player {
            margin-top: 30px;
        }
        .penalty-word-box, .penalty-image-box {
            flex: 1;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            background: #e8f5e9;
            border: 3px solid #4CAF50;
            border-radius: 8px;
            margin: 0 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }
        .penalty-word-box.active, .penalty-image-box.active {
            border-color: #FF9800;
            background: #fff3e0;
            transform: scale(1.05);
        }
        .penalty-word-box.selected, .penalty-image-box.selected {
            border-color: #F44336;
            background: #ffebee;
        }
        .penalty-word-box img, .penalty-image-box img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }
        .penalty-ball {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #fff;
            border-radius: 50%;
            border: 3px solid #333;
            z-index: 10;
            transition: none;
        }
        .penalty-score-board {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin: 20px 0;
        }
        .penalty-score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .penalty-score-label {
            font-size: 1.2rem;
            color: #555;
        }
        .penalty-score-value {
            font-size: 2rem;
            font-weight: bold;
        }
        .penalty-score-value.player {
            color: #4CAF50;
        }
        .penalty-score-value.opponent {
            color: #F44336;
        }
        .penalty-round-info {
            text-align: center;
            font-size: 1.5rem;
            color: #3366ff;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-futbol"></i> Penalty Game <i class="fas fa-futbol"></i></h1>
            <p class="subtitle">Shoot and save in a penalty shootout!</p>
        </header>

        <div id="scoreArea" class="penalty-score-board">
            <div class="penalty-score-item">
                <span class="penalty-score-label">Player</span>
                <span id="playerScore" class="penalty-score-value player">0</span>
            </div>
            <div class="penalty-score-item">
                <span class="penalty-score-label">Opponent</span>
                <span id="opponentScore" class="penalty-score-value opponent">0</span>
            </div>
            <div class="penalty-score-item">
                <span class="penalty-score-label">Round</span>
                <span id="roundCount" class="penalty-score-value">1</span>
            </div>
        </div>

        <div id="roundInfo" class="penalty-round-info">Round 1 – Player shoots</div>

        <div id="penaltyField" class="penalty-field">
            <!-- Opponent goal -->
            <div id="opponentGoal" class="penalty-goal penalty-goal-opponent">
                <!-- word boxes will be generated -->
            </div>
            <!-- Player goal -->
            <div id="playerGoal" class="penalty-goal penalty-goal-player">
                <!-- image boxes will be generated -->
            </div>
            <!-- Ball element -->
            <div id="ball" class="penalty-ball" style="display:none;"></div>
        </div>

        <div style="text-align:center; margin-top:20px;">
            <button id="backBtn" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back
            </button>
        </div>
    </div>

    <script src="wordData.js"></script>
    <script src="wordlistConfig.js"></script>
    <script src="penalty.js"></script>
</body>
</html>
