<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>文化列表 · Culture List</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(30, 50, 30, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 60px;
            padding: 24px 24px 30px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
            margin-top: 10px;
        }

        /* ===== 头部 ===== */
        header {
            text-align: center;
            color: #FFE484;
            text-shadow: 4px 4px 0 #B45309;
            margin-bottom: 16px;
        }

        header h1 {
            font-size: 1.8rem;
            margin: 0;
        }

        header p {
            font-size: 0.9rem;
            opacity: 0.9;
            margin: 5px 0 0;
        }

        /* ===== 返回按钮行 ===== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .back-home-btn {
            background: #607d8b;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #455a64;
            font-family: inherit;
            transition: 0.05s linear;
            text-decoration: none;
            display: inline-block;
        }

        .back-home-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #455a64;
        }

        .badge {
            background: #ffaa33;
            color: #1a2a1a;
            padding: 4px 16px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.85rem;
            box-shadow: 0 3px 0 #b97f44;
        }

        /* ===== 统计栏 ===== */
        .stats {
            background: #31220e;
            padding: 8px 20px;
            border-radius: 50px;
            margin-bottom: 18px;
            color: #ffecb3;
            font-weight: bold;
            font-size: 0.95rem;
            text-align: center;
        }

        .stats strong {
            color: #ffd966;
        }

        /* ===== 列表网格 ===== */
        .list-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        /* ===== 列表卡片 ===== */
        .list-item {
            background: #2c4a2e;
            border-radius: 30px;
            padding: 12px 18px 12px 14px;
            display: flex;
            align-items: center;
            gap: 14px;
            border: 2px solid #ffaa33;
            transition: 0.1s linear;
            cursor: default;
            position: relative;
        }

        .list-item:active {
            transform: scale(0.98);
        }

        /* ===== 图片 ===== */
        .item-image {
            width: 70px;
            height: 70px;
            border-radius: 16px;
            flex-shrink: 0;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 170, 51, 0.3);
        }

        .item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .item-image .no-image {
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
            text-align: center;
            line-height: 1.3;
        }

        /* ===== 文字信息 ===== */
        .item-info {
            flex: 1;
            min-width: 0;
        }

        .item-name {
            color: #ffd966;
            font-size: 1.1rem;
            font-weight: bold;
            text-shadow: 2px 2px 0 #7a4d1a;
            margin-bottom: 2px;
        }

        .item-country {
            color: rgba(255, 236, 179, 0.7);
            font-size: 0.9rem;
        }

        .item-country .flag {
            margin-right: 4px;
        }

        /* ===== 详情按钮 ===== */
        .detail-btn {
            background: #ffaa33;
            border: none;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #b97f44;
            font-family: inherit;
            transition: 0.05s linear;
            flex-shrink: 0;
            white-space: nowrap;
            color: #1a2a1a;
        }

        .detail-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b97f44;
        }

        /* ===== 弹窗 ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.25s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes popIn {
            from {
                transform: scale(0.92);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-content {
            background: #2c4a2e;
            border-radius: 40px;
            max-width: 520px;
            width: 100%;
            max-height: 80vh;
            padding: 30px 32px 32px;
            border: 3px solid #ffaa33;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            animation: popIn 0.25s ease;
            overflow-y: auto;
            position: relative;
        }

        .modal-content::-webkit-scrollbar {
            width: 4px;
        }

        .modal-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .modal-content::-webkit-scrollbar-thumb {
            background: rgba(255, 170, 51, 0.3);
            border-radius: 10px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
            gap: 16px;
        }

        .modal-title {
            color: #ffd966;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 3px 3px 0 #7a4d1a;
            line-height: 1.2;
        }

        .modal-title .modal-country {
            font-size: 1rem;
            font-weight: normal;
            color: rgba(255, 236, 179, 0.6);
            text-shadow: none;
            display: block;
            margin-top: 2px;
        }

        .modal-close {
            background: #607d8b;
            border: none;
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #455a64;
            font-family: inherit;
            transition: 0.05s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            line-height: 1;
        }

        .modal-close:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #455a64;
        }

        .modal-body {
            color: #ffecb3;
            font-size: 1rem;
            line-height: 1.8;
            padding-top: 4px;
        }

        .modal-body p {
            margin-bottom: 10px;
        }

        .modal-body p:last-child {
            margin-bottom: 0;
        }

        /* ===== 空状态 ===== */
        .empty-state {
            color: rgba(255, 236, 179, 0.4);
            text-align: center;
            padding: 50px 20px;
            font-size: 1.1rem;
        }

        .empty-state .sub {
            display: block;
            font-size: 0.85rem;
            color: rgba(255, 236, 179, 0.2);
            margin-top: 8px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 550px) {
            body {
                padding: 12px;
            }

            .container {
                border-radius: 40px;
                padding: 16px 16px 22px;
            }

            header h1 {
                font-size: 1.4rem;
            }

            .top-bar {
                flex-wrap: wrap;
                gap: 8px;
            }

            .list-item {
                padding: 10px 12px 10px 10px;
                border-radius: 20px;
                gap: 10px;
            }

            .item-image {
                width: 56px;
                height: 56px;
                border-radius: 12px;
            }

            .item-name {
                font-size: 0.95rem;
            }

            .item-country {
                font-size: 0.8rem;
            }

            .detail-btn {
                font-size: 0.75rem;
                padding: 4px 14px;
                box-shadow: 0 3px 0 #b97f44;
            }

            .modal-content {
                padding: 22px 18px 24px;
                border-radius: 30px;
                max-height: 90vh;
                margin: 10px;
            }

            .modal-title {
                font-size: 1.2rem;
            }

            .modal-body {
                font-size: 0.9rem;
                line-height: 1.7;
            }

            .stats {
                font-size: 0.8rem;
                padding: 6px 14px;
            }

            .badge {
                font-size: 0.75rem;
                padding: 3px 12px;
            }

            .back-home-btn {
                font-size: 0.75rem;
                padding: 6px 14px;
                box-shadow: 0 3px 0 #455a64;
            }
        }

        @media (max-width: 380px) {
            .item-image {
                width: 46px;
                height: 46px;
            }

            .item-name {
                font-size: 0.85rem;
            }

            .detail-btn {
                font-size: 0.7rem;
                padding: 3px 10px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- ===== 头部 ===== -->
        <header>
            <h1>📜 文化列表</h1>
            <p>🏛️ 世界遗产 · 文明的智慧</p>
        </header>

        <!-- ===== 顶部栏 ===== -->
        <div class="top-bar">
            <a href="index.html" class="back-home-btn"><i class="fas fa-home"></i> 返回主页</a>
            <span class="badge" id="countBadge">0 项</span>
        </div>

        <!-- ===== 统计栏 ===== -->
        <div class="stats" id="statsInfo">
            🌍 共 <strong id="totalCount">0</strong> 个文化标志，
            覆盖 <strong id="countryCount">0</strong> 个国家
        </div>

        <!-- ===== 列表 ===== -->
        <div class="list-grid" id="listContainer"></div>
    </div>

    <!-- ===== 弹窗 ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" id="modalContent">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">
                    <span id="modalName"></span>
                    <span class="modal-country" id="modalCountry"></span>
                </div>
                <button class="modal-close" id="modalCloseBtn">✕</button>
            </div>
            <div class="modal-body" id="modalBody">
                <p id="modalContentText"></p>
            </div>
        </div>
    </div>

    <!-- ===== 引入数据 ===== -->
    <script src="wordData.js"></script>
    <script src="cultureData.js"></script>
    <script src="cultureList.js"></script>

</body>

</html>
