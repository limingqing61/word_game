<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧩</text></svg>">
    <title>Word Game - Matching Mode</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Matching mode specific styles */
        .matching-container {
            display: flex;
            flex-direction: row;
            gap: 40px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .matching-column {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 200px;
        }
        .matching-word-item {
            background: white;
            border-radius: 15px;
            padding: 15px 25px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 4px solid #4fc3f7;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.8rem;
            font-weight: bold;
            color: #333;
            user-select: none;
        }
        .matching-word-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .matching-word-item.selected {
            border-color: #FF9800;
            background: #fff3e0;
        }
        .matching-word-item.matched {
            border-color: #4CAF50;
            background: #e8f5e9;
            pointer-events: none;
            opacity: 0.7;
        }
        .matching-word-item.wrong {
            border-color: #F44336;
            background: #ffebee;
            animation: shake 0.5s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .matching-image-item {
            background: white;
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 4px solid #4fc3f7;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }
        .matching-image-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .matching-image-item.selected {
            border-color: #FF9800;
            background: #fff3e0;
        }
        .matching-image-item.matched {
            border-color: #4CAF50;
            background: #e8f5e9;
            pointer-events: none;
            opacity: 0.7;
        }
        .matching-image-item.wrong {
            border-color: #F44336;
            background: #ffebee;
            animation: shake 0.5s;
        }
        .matching-image-item img {
            width: 100%;
            height: 100px;
            object-fit: contain;
            margin-bottom: 5px;
        }
        .matching-image-item .chinese-label {
            font-size: 1.2rem;
            color: #4CAF50;
            font-weight: bold;
        }
        .matching-round-info {
            text-align: center;
            font-size: 1.5rem;
            color: #3366ff;
            margin: 20px 0;
        }
        .matching-score-board {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 20px 0;
        }
        .matching-score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .matching-score-label {
            font-size: 1.2rem;
            color: #555;
        }
        .matching-score-value {
            font-size: 2rem;
            font-weight: bold;
        }
        .matching-score-value.correct {
            color: #4CAF50;
        }
        .matching-score-value.wrong {
            color: #F44336;
        }
        .matching-score-value.score {
            color: #ff3366;
        }
        @media (max-width: 768px) {
            .matching-container {
                flex-direction: column;
                align-items: center;
            }
            .matching-column {
                min-width: 150px;
            }
            .matching-word-item {
                font-size: 1.4rem;
                padding: 10px 15px;
            }
            .matching-image-item img {
                height: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-puzzle-piece"></i> Word Matching <i class="fas fa-puzzle-piece"></i></h1>
            <p class="subtitle">Match each word to its picture and Chinese!</p>
        </header>

        <div class="matching-score-board">
            <div class="matching-score-item">
                <span class="matching-score-label">Correct:</span>
                <span id="correctCount" class="matching-score-value correct">0</span>
            </div>
            <div class="matching-score-item">
                <span class="matching-score-label">Wrong:</span>
                <span id="wrongCount" class="matching-score-value wrong">0</span>
            </div>
            <div class="matching-score-item">
                <span class="matching-score-label">Score:</span>
                <span id="totalScore" class="matching-score-value score">0</span>
            </div>
            <div class="matching-score-item">
                <span class="matching-score-label">Round:</span>
                <span id="roundCount" class="matching-score-value">0/30</span>
            </div>
        </div>

        <div class="progress-bar">
            <div id="progressFill" class="progress-fill" style="width: 0%"></div>
        </div>

        <div id="roundInfo" class="matching-round-info">Round 1: Match 3 pairs</div>

        <div id="matchingContainer" class="matching-container">
            <!-- Columns will be generated by JavaScript -->
        </div>

        <div style="text-align:center; margin-top:20px;">
            <button id="backBtn" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back
            </button>
        </div>
    </div>

    <script src="matching.js"></script>
</body>
</html>
