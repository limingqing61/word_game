<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flappy Word · 笨鸟先飞</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
            cursor: pointer;
        }

        /* 左上角分数面板 */
        .ui-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            gap: 10px;
            pointer-events: none;
            z-index: 10;
        }

        .score-box,
        .best-box {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            padding: 6px 16px;
            font-weight: bold;
            font-size: 1.1rem;
            pointer-events: auto;
        }

        .score-box {
            color: #FFE484;
        }

        .best-box {
            color: #ffaa33;
            cursor: pointer;
        }

        /* 右上角按钮区域 */
        .button-bar {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .game-btn {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            pointer-events: auto;
            font-family: inherit;
        }

        .game-btn:active {
            transform: scale(0.95);
        }

        /* 遮罩层 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            text-align: center;
        }

        .overlay h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .overlay button {
            background: #ffaa33;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            border-radius: 40px;
            font-weight: bold;
            margin: 10px;
            cursor: pointer;
            pointer-events: auto;
        }

        .countdown {
            font-size: 4rem;
            font-weight: bold;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.2);
                opacity: 0.7;
            }
        }
    </style>
</head>

<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>

        <div class="ui-panel">
            <div class="score-box">🎯 <span id="scoreValue">0</span></div>
            <div class="best-box" id="bestBox">🏆 <span id="bestValue">0</span></div>
        </div>

        <div class="button-bar">
            <button id="pauseBtn" class="game-btn">⏸️</button>
            <button id="homeBtn" class="game-btn">🏠</button>
        </div>
    </div>

    <script src="wordData.js"></script>
    <script src="wordlistConfig.js"></script>
    <script src="flappy.js"></script>
</body>

</html>
