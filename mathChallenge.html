<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Math Challenge · 数学闯关</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            max-width: 750px;
            width: 100%;
            background: rgba(30, 50, 30, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 60px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
        }

        header {
            text-align: center;
            color: #FFE484;
            text-shadow: 4px 4px 0 #B45309;
            margin-bottom: 12px;
        }

        header h1 {
            font-size: 1.8rem;
            margin: 0;
        }

        header p {
            font-size: 0.85rem;
            opacity: 0.9;
            margin: 2px 0 0;
        }

        .top-panel {
            display: flex;
            justify-content: space-between;
            background: #31220e;
            padding: 6px 16px;
            border-radius: 50px;
            margin-bottom: 15px;
            color: #ffecb3;
            font-weight: bold;
            flex-wrap: wrap;
            gap: 4px;
            font-size: 0.95rem;
        }

        .timer-display {
            color: #ff6b6b;
            font-size: 1.2rem;
        }

        .timer-display.warning {
            animation: blink 0.5s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .game-area {
            background: #2c4a2e;
            border-radius: 40px;
            padding: 25px;
            border: 3px solid #ffaa33;
            min-height: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .question-text {
            font-size: 2.8rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 25px;
            text-align: center;
            min-height: 4rem;
        }

        .question-text .highlight {
            color: #ffd966;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        .option-btn {
            background: #fef3c7;
            border: none;
            border-radius: 20px;
            padding: 12px 8px;
            cursor: pointer;
            box-shadow: 0 5px 0 #b97f44;
            transition: 0.05s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
        }

        .option-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b97f44;
        }

        .option-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .option-btn img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        .option-btn.correct {
            background: #4CAF50;
            box-shadow: 0 4px 0 #2e7d32;
        }

        .option-btn.correct img {
            border: 3px solid #4CAF50;
            border-radius: 10px;
        }

        .option-btn.wrong {
            background: #F44336;
            box-shadow: 0 4px 0 #b71c1c;
        }

        .option-btn.wrong img {
            border: 3px solid #F44336;
            border-radius: 10px;
        }

        .feedback {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 15px;
            min-height: 2.2rem;
            color: #ffeaac;
        }

        .feedback.correct {
            color: #a5ffa5;
        }

        .feedback.wrong {
            color: #ffaaaa;
        }

        .result-area {
            display: none;
            text-align: center;
            padding: 20px;
            margin-top: 15px;
        }

        .result-area h2 {
            font-size: 2.5rem;
            color: #ffd966;
            margin-bottom: 15px;
        }

        .result-area .final-score {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffaa33;
            margin-bottom: 20px;
        }

        .result-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .result-buttons button {
            background: #ffaa33;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #b97f44;
            font-family: inherit;
        }

        .result-buttons button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b97f44;
        }

        .result-buttons button.home-btn {
            background: #607d8b;
            color: white;
            box-shadow: 0 4px 0 #455a64;
        }

        .image-fallback {
            font-size: 2.5rem;
        }

        /* 启动遮罩 */
        #startOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a472a 0%, #0e2a1a 100%);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            text-align: center;
        }

        #startOverlay h1 {
            font-size: 2.5rem;
            text-shadow: 4px 4px 0 #b45309;
        }

        #startBtn {
            background: #ffaa33;
            border: none;
            padding: 16px 48px;
            font-size: 1.5rem;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 0 #b97f44;
            font-family: inherit;
        }

        /* ===== 新增：返回首页按钮样式 ===== */
        .back-home-btn {
            background: #607d8b;
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 0 #455a64;
            transition: 0.05s linear;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-home-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #455a64;
        }

        .bottom-bar {
            text-align: center;
            margin-top: 15px;
        }

        @media (max-width: 600px) {
            .options-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
            }

            .question-text {
                font-size: 2rem;
            }

            header h1 {
                font-size: 1.4rem;
            }

            .top-panel {
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body>
    <div id="startOverlay">
        <h1>🧮 Math Challenge</h1>
        <div style="margin-bottom: 20px;">➕ 数学闯关 · 限时挑战 ➖</div>
        <button id="startBtn">🔊 开始挑战</button>
    </div>

    <div class="game-container" id="gameContainer" style="display: none;">
        <header>
            <h1><i class="fas fa-calculator"></i> Math Challenge <i class="fas fa-calculator"></i></h1>
            <p>🧠 限时计算 · 看图选数</p>
        </header>

        <div class="top-panel">
            <span>🏆 得分: <span id="scoreValue">0</span></span>
            <span>📊 第 <span id="roundValue">1</span>/<span id="totalRounds">20</span> 关</span>
            <span class="timer-display" id="timerDisplay">⏱️ <span id="timerValue">0</span>s</span>
        </div>

        <div class="game-area" id="gameArea">
            <div class="question-text" id="questionText">?</div>
            <div class="options-grid" id="optionsContainer"></div>
            <div class="feedback" id="feedback"></div>
        </div>

        <!-- ===== 游戏进行中的返回首页按钮 ===== -->
        <div class="bottom-bar">
            <button id="backBtn" class="back-home-btn">
                <i class="fas fa-home"></i> 返回首页
            </button>
        </div>

        <div class="result-area" id="resultArea">
            <h2>🎉 闯关完成！ 🎉</h2>
            <div class="final-score">⭐ <span id="finalScore">0</span> / 100</div>
            <div class="result-buttons">
                <button id="restartBtn"><i class="fas fa-redo"></i> 再来一局</button>
                <button id="backHomeBtn" class="home-btn"><i class="fas fa-home"></i> 返回主页</button>
            </div>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="wordData.js"></script>
    <script src="wordlistConfig.js"></script>
    <script src="mathChallenge.js"></script>
</body>

</html>
