<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fishing Game · 钓鱼大师</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            max-width: 1000px;
            width: 100%;
            background: rgba(30, 50, 30, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 15px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
        }

        header {
            text-align: center;
            color: #FFE484;
            text-shadow: 4px 4px 0 #B45309;
            margin-bottom: 10px;
        }

        header h1 {
            font-size: 1.8rem;
            margin: 0;
        }

        .difficulty-bar {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 10px 0;
        }

        .difficulty-btn {
            background: #ffbb33;
            border: none;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .difficulty-btn.active {
            background: #ff6b6b;
            color: white;
            box-shadow: 0 0 0 2px gold;
        }

        .score-panel {
            display: flex;
            justify-content: space-between;
            background: #31220e;
            padding: 6px 16px;
            border-radius: 50px;
            margin-bottom: 12px;
            color: #ffecb3;
            font-size: 1rem;
        }

        .game-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .rod-area {
            background: #d9b48b;
            border-radius: 28px;
            padding: 12px;
            display: flex;
            justify-content: center;
        }

        .rod-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            max-width: 100%;
        }

        .rod-card {
            background: #fef3c7;
            border-radius: 18px;
            text-align: center;
            padding: 8px;
            cursor: pointer;
            box-shadow: 0 4px 0 #b97f44;
            transition: 0.05s linear;
            aspect-ratio: 1 / 0.9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .rod-card:active {
            transform: translateY(2px);
        }

        .rod-card img {
            width: 75px;
            height: 75px;
            object-fit: contain;
        }

        .pond-area {
            background: #3b8c5a;
            border-radius: 24px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .fish-lane {
            position: relative;
            background: #267c4a;
            border-radius: 50px;
            height: 85px;
            overflow: visible;
        }

        .fish {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 75px;
            height: 75px;
            object-fit: contain;
            cursor: pointer;
            z-index: 10;
            transition: left 0.02s linear;
        }

        .float-number {
            position: fixed;
            font-size: 2rem;
            font-weight: bold;
            pointer-events: none;
            z-index: 200;
            animation: floatUp 0.5s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0);
            }

            100% {
                opacity: 0;
                transform: translateY(-60px);
            }
        }

        .end-screen {
            text-align: center;
            background: #0f1f0f;
            border-radius: 60px;
            padding: 20px;
            margin-top: 20px;
        }

        .back-btn {
            background: #ffaa33;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
        }

        @media (max-width: 800px) {
            .rod-card img {
                width: 55px;
                height: 55px;
            }

            .fish {
                width: 60px;
                height: 60px;
            }

            .fish-lane {
                height: 70px;
            }
        }
    </style>
</head>

<body>
    <div class="game-container">
        <header>
            <h1><i class="fas fa-fish"></i> Fishing Game · 钓鱼大师</h1>
        </header>

        <div class="difficulty-bar" id="difficultyBar">
            <button class="difficulty-btn" data-diff="low">🐢 低</button>
            <button class="difficulty-btn active" data-diff="medium">⚡ 中</button>
            <button class="difficulty-btn" data-diff="high">🔥 高</button>
        </div>

        <div class="score-panel">
            <span>🎣 钓鱼大师</span>
            <span>⭐ 得分: <span id="totalScore">0</span></span>
        </div>

        <div class="game-grid">
            <div id="rodArea" class="rod-area"></div>
            <div id="pondArea" class="pond-area"></div>
        </div>

        <div id="endScreen" style="display: none;"></div>
    </div>

    <audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"
        preload="auto"></audio>
    <audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3"
        preload="auto"></audio>

    <script src="utils.js"></script>
    <script src="wordData.js"></script>
    <script src="wordlistConfig.js"></script>
    <script src="fishing.js"></script>
</body>

</html>
