<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Puzzle Game · 不拼图就拼命</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            max-width: 1100px;
            width: 100%;
            background: rgba(30, 50, 30, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
        }

        header {
            text-align: center;
            color: #FFE484;
            text-shadow: 4px 4px 0 #B45309;
        }

        header h1 {
            font-size: 2rem;
            margin: 0;
        }

        header p {
            font-size: 0.9rem;
            opacity: 0.9;
            margin: 5px 0 10px;
        }

        .level-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .level-btn {
            background: #ffbb33;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.1s linear;
        }

        .level-btn.active {
            background: #ff6b6b;
            color: white;
            transform: scale(1.02);
            box-shadow: 0 0 0 3px gold;
        }

        .level-btn:active {
            transform: translateY(2px);
        }

        .info-area {
            background: #0f1f0f;
            border-radius: 60px;
            padding: 8px 20px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 10px;
            color: white;
        }

        .timer-box,
        .best-box {
            background: #2a412a;
            padding: 5px 15px;
            border-radius: 40px;
        }

        .timer-box span,
        .best-box span {
            font-size: 1rem;
            font-weight: bold;
        }

        .timer-value,
        .best-value {
            font-size: 1.3rem;
            font-family: monospace;
            margin-left: 8px;
        }

        /* 主游戏区：左右布局 */
        .game-layout {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        /* 样板区（左侧） */
        .template-area {
            flex: 1;
            min-width: 120px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            padding: 15px;
        }

        .template-title {
            text-align: center;
            color: #ffd966;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .template-grid {
            display: grid;
            justify-content: center;
            gap: 6px;
        }

        .template-cell {
            aspect-ratio: 1 / 1;
            background: #5a3a1a;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: bold;
            color: #ffd966;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.3);
        }

        .template-cell.empty {
            background: #2c5a2c;
            background-image: radial-gradient(circle at 30% 35%, #4a7a4a 2%, transparent 2.5%);
            background-size: 12px 12px;
        }

        /* 拼图区（右侧） */
        .puzzle-area {
            flex: 3;
            min-width: 200px;
        }

        .puzzle-grid {
            display: grid;
            justify-content: center;
            gap: 8px;
        }

        .puzzle-cell {
            aspect-ratio: 1 / 1;
            background: #fef7e0;
            border-radius: 16px;
            box-shadow: 0 6px 0 #b47c2e;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.05s linear;
            overflow: hidden;
        }

        .puzzle-cell:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #b47c2e;
        }

        .puzzle-cell img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        .puzzle-cell.empty {
            background: #2c5a2c;
            background-image: radial-gradient(circle at 30% 35%, #4a7a4a 2%, transparent 2.5%);
            background-size: 20px 20px;
            box-shadow: inset 0 0 0 2px #f3c26b;
            cursor: default;
        }

        .puzzle-cell.empty:active {
            transform: none;
            box-shadow: inset 0 0 0 2px #f3c26b;
        }

        .message {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 10px;
            color: #ffeaac;
        }

        .back-btn {
            background: #ffaa33;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        @media (max-width: 700px) {
            .game-layout {
                flex-direction: column;
            }

            .template-area {
                order: 1;
                min-width: auto;
            }

            .puzzle-area {
                order: 2;
            }

            .template-grid {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 6px;
            }

            .template-cell {
                width: 40px;
                font-size: 0.8rem;
            }

            .puzzle-cell img {
                width: 70%;
                height: 70%;
            }
        }

        @media (max-width: 480px) {
            .template-cell {
                width: 35px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>

<body>
    <div class="game-container">
        <header>
            <h1><i class="fas fa-puzzle-piece"></i> 不拼图就拼命 <i class="fas fa-skull"></i></h1>
            <p>Slide the tiles to solve the puzzle!</p>
        </header>

        <div class="level-bar" id="levelBar">
            <button class="level-btn" data-level="0">3x3</button>
            <button class="level-btn" data-level="1">3x4</button>
            <button class="level-btn" data-level="2">4x4</button>
            <button class="level-btn" data-level="3">4x5</button>
        </div>

        <div class="info-area">
            <div class="timer-box">⏱️ 用时: <span id="timerDisplay" class="timer-value">0</span><span> 秒</span></div>
            <div class="best-box">🏆 最快记录: <span id="bestDisplay" class="best-value">—</span></div>
        </div>

        <!-- 左右布局 -->
        <div class="game-layout">
            <!-- 左侧样板区 -->
            <div class="template-area" id="templateArea">
                <div class="template-title">📋 正确顺序</div>
                <div id="templateGrid" class="template-grid"></div>
            </div>

            <!-- 右侧拼图区 -->
            <div class="puzzle-area">
                <div id="puzzleGrid" class="puzzle-grid"></div>
            </div>
        </div>

        <div id="gameMessage" class="message"></div>

        <div style="text-align:center; margin-top:15px; display:flex; justify-content:center; gap:15px;">
            <button id="playAgainBtn" class="back-btn" style="background:#4caf50; display:none;">🎮 再来一局</button>
            <button id="backToMenuBtn" class="back-btn"><i class="fas fa-arrow-left"></i> 返回菜单</button>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="wordData.js"></script>
    <script src="wordlistConfig.js"></script>
    <script src="puzzle.js"></script>
</body>

</html>
