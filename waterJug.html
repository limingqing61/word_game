<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Water Jug · 量水游戏</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            max-width: 820px;
            width: 100%;
            background: rgba(30, 50, 30, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
        }

        header {
            text-align: center;
            color: #FFE484;
            text-shadow: 4px 4px 0 #B45309;
            margin-bottom: 12px;
        }

        header h1 {
            font-size: 1.8rem;
            margin: 0;
        }

        header p {
            font-size: 0.85rem;
            opacity: 0.9;
            margin: 2px 0 0;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            background: #31220e;
            padding: 6px 16px;
            border-radius: 50px;
            margin-bottom: 12px;
            color: #ffecb3;
            font-weight: bold;
            flex-wrap: wrap;
            gap: 4px;
            font-size: 0.95rem;
        }

        .target-display {
            color: #ff6b6b;
        }

        .steps-display {
            color: #4fc3f7;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: auto;
            background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
            border-radius: 30px;
            cursor: pointer;
            touch-action: none;
        }

        .control-area {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .control-btn {
            background: #ffaa33;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #b97f44;
            transition: 0.05s linear;
            font-family: inherit;
        }

        .control-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b97f44;
        }

        .control-btn.reset {
            background: #607d8b;
            color: white;
            box-shadow: 0 4px 0 #455a64;
        }

        .control-btn.hint {
            background: #2196f3;
            color: white;
            box-shadow: 0 4px 0 #0b5e7e;
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            text-align: center;
            margin-top: 8px;
            font-size: 1rem;
            font-weight: bold;
            color: #ffeaac;
            min-height: 1.6rem;
        }

        .result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 20000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-card {
            background: linear-gradient(135deg, #fff9ef, #ffe0b3);
            border-radius: 50px;
            padding: 30px;
            text-align: center;
            max-width: 320px;
            width: 80%;
            border: 4px solid #ffaa33;
        }

        .result-card h2 {
            font-size: 2rem;
            margin: 0 0 12px;
        }

        .result-card button {
            background: #4caf50;
            border: none;
            padding: 10px 25px;
            font-size: 1rem;
            border-radius: 40px;
            margin: 6px;
            cursor: pointer;
            font-family: inherit;
        }

        #startOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a472a 0%, #0e2a1a 100%);
            z-index: 100000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            text-align: center;
        }

        #startOverlay h1 {
            font-size: 2.5rem;
            text-shadow: 4px 4px 0 #b45309;
        }

        #startBtn {
            background: #ffaa33;
            border: none;
            padding: 16px 48px;
            font-size: 1.5rem;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 0 #b97f44;
            font-family: inherit;
        }

        @media (max-width: 600px) {
            .game-container {
                padding: 12px;
            }

            header h1 {
                font-size: 1.3rem;
            }

            .info-panel {
                font-size: 0.75rem;
                padding: 4px 10px;
            }

            .control-btn {
                padding: 6px 14px;
                font-size: 0.8rem;
            }

            .message {
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>
    <div id="startOverlay">
        <h1>💧 Water Jug</h1>
        <div style="margin-bottom: 20px;">🪣 量水游戏 · 用两个桶量出目标水量</div>
        <button id="startBtn">🔊 开始挑战</button>
    </div>

    <div class="game-container" id="gameContainer" style="display: none;">
        <header>
            <h1><i class="fas fa-water"></i> Water Jug · 量水游戏 <i class="fas fa-water"></i></h1>
            <p>点击水源 → 点击目的，倒水入缸</p>
        </header>

        <div class="info-panel">
            <span class="target-display">🎯 目标: <span id="targetDisplay">0</span>L</span>
            <span class="steps-display">👣 步数: <span id="stepsDisplay">0</span></span>
            <span>🪣 A: <span id="jugASize">0</span>L &nbsp;|&nbsp; B: <span id="jugBSize">0</span>L</span>
        </div>

        <canvas id="gameCanvas" width="780" height="420"></canvas>

        <div id="message" class="message">💡 点击水源（河流或桶），再点击目的（桶或大缸）</div>

        <div class="control-area">
            <button id="resetBtn" class="control-btn reset"><i class="fas fa-redo"></i> 重置</button>
            <button id="hintBtn" class="control-btn hint"><i class="fas fa-lightbulb"></i> 提示</button>
            <button id="backBtn" class="control-btn"
                style="background:#607d8b; color:white; box-shadow:0 4px 0 #455a64;"><i class="fas fa-home"></i>
                返回</button>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="waterJug.js"></script>
</body>

</html>
