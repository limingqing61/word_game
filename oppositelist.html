<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Opposite List · 反义词表</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .opposite-list-container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff9ef;
            border-radius: 60px;
            padding: 25px;
        }

        .opposite-item {
            background: white;
            border-radius: 40px;
            margin-bottom: 25px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .opposite-img {
            width: 200px;
            height: 150px;
            object-fit: contain;
            background: #f0e5d2;
            border-radius: 20px;
            flex-shrink: 0;
        }

        .word-card-left,
        .word-card-right {
            flex: 1;
            min-width: 160px;
            text-align: center;
            background: #fef7e0;
            border-radius: 30px;
            padding: 12px 8px;
        }

        .word-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 5px 0;
        }

        .word-phonetic {
            font-size: 0.8rem;
            font-family: monospace;
            color: #3366ff;
        }

        .word-chinese {
            font-size: 0.9rem;
            color: #4caf50;
            font-weight: bold;
            margin-top: 5px;
        }

        .speak-btn {
            background: #ffd966;
            border: none;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 6px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .speak-btn:active {
            transform: translateY(2px);
        }

        @media (max-width: 700px) {
            .opposite-img {
                width: 150px;
                height: 120px;
            }

            .word-card-left,
            .word-card-right {
                min-width: 130px;
                padding: 8px 5px;
            }

            .word-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-exchange-alt"></i> Opposite List</h1>
            <p>Browse opposite words with pictures and pronunciation</p>
        </header>

        <div class="opposite-list-container" id="oppositeListContainer">
            <div style="text-align:center; padding:30px;">加载中...</div>
        </div>

        <div style="text-align:center; margin-top:20px;">
            <button id="backBtn" class="back-btn"><i class="fas fa-arrow-left"></i> Back</button>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="oppositeData.js"></script>
    <script src="oppositelist.js"></script>
</body>

</html>
