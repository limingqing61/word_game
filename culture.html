<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Culture Quest · 看标志猜国家</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            max-width: 700px;
            width: 100%;
            background: rgba(30, 50, 30, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 60px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
        }

        header {
            text-align: center;
            color: #FFE484;
            text-shadow: 4px 4px 0 #B45309;
            margin-bottom: 15px;
        }

        header h1 {
            font-size: 1.8rem;
            margin: 0;
        }

        header p {
            font-size: 0.9rem;
            opacity: 0.9;
            margin: 5px 0 0;
        }

        .score-panel {
            display: flex;
            justify-content: space-between;
            background: #31220e;
            padding: 8px 20px;
            border-radius: 50px;
            margin-bottom: 20px;
            color: #ffecb3;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .game-area {
            background: #2c4a2e;
            border-radius: 40px;
            padding: 20px;
            border: 3px solid #ffaa33;
            min-height: 450px;
        }

        .question-image-area {
            text-align: center;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            padding: 10px;
        }

        .question-image-area img {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 20px;
            background: white;
            padding: 15px;
            display: block;
        }

        .question-hint {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd966;
            margin-bottom: 20px;
            min-height: 3rem;
        }

        .options-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .option-btn {
            background: white;
            border: none;
            padding: 4px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 0 #b97f44;
            transition: 0.05s linear;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            aspect-ratio: 4 / 3;
            position: relative;
        }

        .option-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            display: block;
        }

        .option-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b97f44;
        }

        .option-btn:disabled {
            opacity: 0.8;
            cursor: not-allowed;
            transform: none;
        }

        .option-btn.correct {
            box-shadow: 0 0 0 4px #4CAF50, 0 4px 0 #2e7d32;
        }

        .option-btn.correct img {
            border: 3px solid #4CAF50;
        }

        .option-btn.wrong {
            box-shadow: 0 0 0 4px #F44336, 0 4px 0 #b71c1c;
        }

        .option-btn.wrong img {
            border: 3px solid #F44336;
        }

        .country-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 4px 0;
            font-size: 0.85rem;
            font-weight: bold;
            text-align: center;
            border-radius: 0 0 8px 8px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            pointer-events: none;
        }

        .country-label.correct-label {
            background: rgba(76, 175, 80, 0.9);
        }

        .country-label.wrong-label {
            background: rgba(244, 67, 54, 0.9);
        }

        .feedback {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 15px;
            min-height: 2.5rem;
        }

        .feedback.correct {
            color: #a5ffa5;
        }

        .feedback.wrong {
            color: #ffaaaa;
        }

        .result-area {
            display: none;
            text-align: center;
            padding: 30px 20px;
        }

        .result-area h2 {
            font-size: 2.5rem;
            color: #ffd966;
            margin-bottom: 15px;
        }

        .result-area .final-score {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffaa33;
            margin-bottom: 20px;
        }

        .result-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .result-buttons button {
            background: #ffaa33;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #b97f44;
            font-family: inherit;
        }

        .result-buttons button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b97f44;
        }

        .result-buttons button.home-btn {
            background: #607d8b;
            color: white;
            box-shadow: 0 4px 0 #455a64;
        }

        .image-fallback {
            font-size: 5rem;
            padding: 40px;
        }

        /* 启动遮罩 */
        #startOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a472a 0%, #0e2a1a 100%);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            text-align: center;
        }

        #startOverlay h1 {
            font-size: 2.5rem;
            text-shadow: 4px 4px 0 #b45309;
        }

        #startBtn {
            background: #ffaa33;
            border: none;
            padding: 16px 48px;
            font-size: 1.5rem;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 0 #b97f44;
            font-family: inherit;
        }

        @media (max-width: 550px) {
            .options-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .question-image-area img {
                max-height: 200px;
                padding: 10px;
            }

            header h1 {
                font-size: 1.4rem;
            }

            .country-label {
                font-size: 0.7rem;
                padding: 3px 0;
            }
        }
    </style>
</head>

<body>
    <!-- 启动遮罩 -->
    <div id="startOverlay">
        <h1>🌍 Culture Quest</h1>
        <div style="margin-bottom: 20px;">🗺️ 看标志 · 猜国家</div>
        <button id="startBtn">🔊 开始挑战</button>
    </div>

    <div class="game-container" id="gameContainer" style="display: none;">
        <header>
            <h1><i class="fas fa-globe-americas"></i> Culture Quest <i class="fas fa-globe-asia"></i></h1>
            <p>🌍 看标志 · 猜国家</p>
        </header>

        <div class="score-panel">
            <span>🏆 得分: <span id="scoreValue">0</span></span>
            <span>📊 进度: <span id="progressValue">0/10</span></span>
            <span style="display:none;" id="totalQuestions">10</span>
        </div>

        <div class="game-area" id="gameArea">
            <div class="question-image-area">
                <img id="questionImage" src="" alt="风俗图片">
            </div>
            <div class="question-hint" id="questionHint">?</div>
            <div class="options-container" id="optionsContainer"></div>
            <div class="feedback" id="feedback"></div>
        </div>

        <div class="result-area" id="resultArea">
            <h2>🎉 游戏完成！ 🎉</h2>
            <div class="final-score">⭐ <span id="finalScore">0</span> / 100</div>
            <div class="result-buttons">
                <button id="restartBtn"><i class="fas fa-redo"></i> 再来一局</button>
                <button id="backHomeBtn" class="home-btn"><i class="fas fa-home"></i> 返回主页</button>
            </div>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="wordData.js"> </script>
    <script src="cultureData.js"></script>
    <script src="culture.js"></script>
</body>

</html>
