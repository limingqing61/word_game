<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>存异求同 · Duplicate Match</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            max-width: 820px;
            width: 100%;
            background: rgba(30, 50, 30, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 60px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
        }

        header {
            text-align: center;
            color: #FFE484;
            text-shadow: 4px 4px 0 #B45309;
            margin-bottom: 8px;
        }

        header h1 {
            font-size: 1.6rem;
            margin: 0;
        }

        header p {
            font-size: 0.8rem;
            opacity: 0.9;
            margin: 2px 0 0;
        }

        .info-area {
            background: #0f1f0f;
            border-radius: 60px;
            padding: 6px 18px;
            margin: 8px 0 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            color: white;
        }

        .info-area .round-box,
        .info-area .timer-box,
        .info-area .best-box {
            background: #2a412a;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.9rem;
        }

        .info-area .timer-box .timer-value,
        .info-area .best-box .best-value {
            font-weight: bold;
            font-family: monospace;
            font-size: 1.1rem;
            margin-left: 4px;
        }

        .best-box {
            cursor: pointer;
        }

        /* 左右图片区 - 3-2-3 交错布局（修正版） */
        .panels-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 30px;
            margin: 10px 0;
        }

        .panel {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 24px;
            padding: 14px 16px;
            border: 2px solid rgba(255, 170, 51, 0.3);
            min-width: 160px;
            flex: 1;
            max-width: 300px;
        }

        .panel-label {
            text-align: center;
            color: #ffd966;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .panel-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            width: 100%;
            justify-content: center;
        }

        .panel-grid .panel-img {
            width: 30%;
            aspect-ratio: 1 / 1;
            flex-shrink: 0;
            background: #fef7e0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            box-shadow: 0 3px 0 #b47c2e;
        }

        .panel-grid .panel-img img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        .panel-grid .panel-img .placeholder {
            font-size: 1.2rem;
            color: #aaa;
        }

        /* ===== 交错排列：使用 margin 偏移 ===== */
        /* 第3、4张图（索引3,4）为中间行 */
        .panel-grid .panel-img.row2-col1 {
            margin-left: 9%;
        }

        .panel-grid .panel-img.row2-col2 {
            margin-left: 1%;
        }

        /* 公共图提示 */
        .common-hint {
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
            color: #ffeaac;
            margin: 8px 0 12px;
            padding: 6px 12px;
            background: rgba(255, 213, 79, 0.12);
            border-radius: 30px;
            border: 1px solid rgba(255, 213, 79, 0.2);
            display: inline-block;
        }

        .common-hint-wrapper {
            text-align: center;
        }

        .common-hint .highlight {
            color: #ffaa33;
            font-size: 1.1rem;
        }

        /* 候选区 */
        .candidate-wrapper {
            margin-top: 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 24px;
            padding: 12px 14px;
            border: 2px solid rgba(255, 170, 51, 0.15);
        }

        .candidate-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            justify-items: center;
        }

        .candidate-grid .candidate-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #fef7e0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            box-shadow: 0 3px 0 #b47c2e;
            cursor: pointer;
            transition: 0.05s linear;
            position: relative;
        }

        .candidate-grid .candidate-img:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #b47c2e;
        }

        .candidate-grid .candidate-img img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        .candidate-grid .candidate-img .placeholder {
            font-size: 1.2rem;
            color: #aaa;
        }

        .candidate-grid .candidate-img.selected {
            border: 3px solid #ffd700;
            box-shadow: 0 0 0 2px #ffd700, 0 3px 0 #b47c2e;
        }

        .candidate-grid .candidate-img.wrong {
            border: 3px solid #f44336;
            animation: shake 0.3s ease;
        }

        .candidate-grid .candidate-img.correct {
            border: 3px solid #4CAF50;
            animation: pop 0.3s ease;
        }

        .candidate-grid .candidate-img.disabled {
            pointer-events: none;
            opacity: 0.6;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            75% {
                transform: translateX(6px);
            }
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1);
            }
        }

        /* 爆炸效果 */
        .explosion-effect {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            pointer-events: none;
            z-index: 1000;
            animation: boom 0.4s ease-out forwards;
        }

        @keyframes boom {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.3);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(2.2);
            }
        }

        /* 消息 */
        .message {
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 10px;
            color: #ffeaac;
            min-height: 1.8rem;
        }

        /* 游戏结束浮层 */
        .result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 20000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-card {
            background: linear-gradient(135deg, #fff9ef, #ffe0b3);
            border-radius: 60px;
            padding: 35px 45px;
            text-align: center;
            max-width: 380px;
            width: 85%;
            border: 4px solid #ffaa33;
        }

        .result-card h2 {
            font-size: 2.2rem;
            margin: 0 0 10px;
            color: #31220e;
        }

        .result-card .final-time {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ff6b6b;
            margin: 10px 0;
        }

        .result-card .final-label {
            font-size: 1.1rem;
            color: #5a4a2e;
        }

        .result-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .result-buttons button {
            border: none;
            padding: 10px 28px;
            font-size: 1rem;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 0 #b97f44;
            transition: 0.05s linear;
        }

        .result-buttons button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b97f44;
        }

        .result-buttons .btn-restart {
            background: #4caf50;
            color: white;
            box-shadow: 0 4px 0 #2e7d32;
        }

        .result-buttons .btn-home {
            background: #607d8b;
            color: white;
            box-shadow: 0 4px 0 #455a64;
        }

        .back-home-btn {
            background: #607d8b;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 0 #455a64;
            transition: 0.05s linear;
        }

        .back-home-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #455a64;
        }

        /* 启动遮罩 */
        #startOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a472a 0%, #0e2a1a 100%);
            z-index: 100000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            text-align: center;
        }

        #startOverlay h1 {
            font-size: 2.5rem;
            text-shadow: 4px 4px 0 #b45309;
            margin-bottom: 10px;
        }

        #startOverlay .subtitle {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .rule-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 30px;
            padding: 16px 24px;
            margin-bottom: 25px;
            max-width: 340px;
            width: 90%;
        }

        .rule-box p {
            margin: 6px 0;
            font-size: 1rem;
            opacity: 0.9;
        }

        .rule-box .highlight {
            color: #ffd54f;
            font-weight: bold;
        }

        #startBtn {
            background: #ffaa33;
            border: none;
            padding: 14px 44px;
            font-size: 1.4rem;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 0 #b97f44;
            font-family: inherit;
            transition: 0.05s linear;
        }

        #startBtn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b97f44;
        }

        @media (max-width: 600px) {
            .game-container {
                padding: 12px;
            }

            header h1 {
                font-size: 1.2rem;
            }

            .info-area {
                font-size: 0.7rem;
                padding: 4px 10px;
            }

            .panels-container {
                gap: 12px;
                flex-direction: column;
                align-items: center;
            }

            .panel {
                max-width: 280px;
                width: 100%;
                padding: 10px;
            }

            .panel-grid {
                gap: 4px;
            }

            .panel-grid .panel-img {
                border-radius: 8px;
                box-shadow: 0 2px 0 #b47c2e;
            }

            .panel-grid .panel-img.row2-col1 {
                margin-left: 8%;
            }

            .panel-grid .panel-img.row2-col2 {
                margin-left: 0%;
            }

            .candidate-grid {
                gap: 4px;
            }

            .candidate-grid .candidate-img {
                border-radius: 8px;
                box-shadow: 0 2px 0 #b47c2e;
            }

            .common-hint {
                font-size: 0.8rem;
            }

            #startOverlay h1 {
                font-size: 1.8rem;
            }

            #startBtn {
                font-size: 1.1rem;
                padding: 12px 32px;
            }

            .result-card {
                padding: 25px 25px;
            }
        }
    </style>
</head>

<body>

    <!-- ===== 启动遮罩 ===== -->
    <div id="startOverlay">
        <h1>🔍 存异求同</h1>
        <div class="subtitle">Duplicate Match</div>

        <div class="rule-box">
            <p>🎯 左右两区各有 <span class="highlight">8 张</span>图片</p>
            <p>🔍 找到 <span class="highlight">唯一相同</span> 的那一张</p>
            <p>📊 共 <span class="highlight">10 局</span> · 10 个不同类别</p>
            <p>⏱️ 看看你多久能通关！</p>
        </div>

        <button id="startBtn">🔊 开始挑战</button>
    </div>

    <!-- ===== 游戏容器 ===== -->
    <div class="game-container" id="gameContainer" style="display: none;">
        <header>
            <h1>🔍 存异求同</h1>
            <p>Duplicate Match · Find the Same</p>
        </header>

        <div class="info-area">
            <span class="round-box">📊 第 <span id="roundDisplay">1</span>/10 局</span>
            <span class="timer-box">⏱️ <span id="timerDisplay" class="timer-value">0</span> 秒</span>
            <span class="best-box" id="bestBox">🏆 最佳: <span id="bestDisplay" class="best-value">—</span></span>
        </div>

        <div class="common-hint-wrapper">
            <div class="common-hint" id="commonHint">🔍 找出左右两区 <span class="highlight">唯一相同</span> 的那一张图！</div>
        </div>

        <div class="panels-container" id="panelsContainer">
            <!-- 左区 -->
            <div class="panel" id="leftPanel">
                <div class="panel-label">⬅️ 左区</div>
                <div class="panel-grid" id="leftGrid"></div>
            </div>
            <!-- 右区 -->
            <div class="panel" id="rightPanel">
                <div class="panel-label">右区 ➡️</div>
                <div class="panel-grid" id="rightGrid"></div>
            </div>
        </div>

        <div class="candidate-wrapper">
            <div class="candidate-grid" id="candidateGrid"></div>
        </div>

        <div id="message" class="message"></div>

        <div style="text-align:center; margin-top:14px;">
            <button id="backHomeBtn" class="back-home-btn"><i class="fas fa-home"></i> 返回首页</button>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="wordData.js"></script>
    <script src="wordlistConfig.js"></script>
    <script src="duplicateMatch.js"></script>
</body>

</html>
