<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Crash Game · 对对碰</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            max-width: 1000px;
            width: 100%;
            background: rgba(30, 50, 30, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
        }

        header {
            text-align: center;
            color: #FFE484;
            text-shadow: 4px 4px 0 #B45309;
        }

        header h1 {
            font-size: 2rem;
            margin: 0;
        }

        header p {
            font-size: 0.9rem;
            opacity: 0.9;
            margin: 5px 0 10px;
        }

        .level-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .level-btn {
            background: #ffbb33;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.1s linear;
        }

        .level-btn.active {
            background: #ff6b6b;
            color: white;
            transform: scale(1.02);
            box-shadow: 0 0 0 3px gold;
        }

        .level-btn:active {
            transform: translateY(2px);
        }

        .info-area {
            background: #0f1f0f;
            border-radius: 60px;
            padding: 8px 20px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 10px;
            color: white;
        }

        .timer-box,
        .best-box {
            background: #2a412a;
            padding: 5px 15px;
            border-radius: 40px;
        }

        .timer-box span,
        .best-box span {
            font-size: 1rem;
            font-weight: bold;
        }

        .timer-value,
        .best-value {
            font-size: 1.3rem;
            font-family: monospace;
            margin-left: 8px;
        }

        .grid {
            display: grid;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
        }

        .card {
            aspect-ratio: 1 / 0.9;
            background: #fef7e0;
            border-radius: 20px;
            box-shadow: 0 8px 0 #b47c2e;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 8px;
            transition: 0.05s linear;
            position: relative;
        }

        .card.back {
            background: #2c5a2c;
            background-image: radial-gradient(circle at 30% 35%, #4a7a4a 2%, transparent 2.5%);
            background-size: 20px 20px;
            border: 3px solid #f3c26b;
        }

        .card.back::after {
            content: "?";
            font-size: 3rem;
            font-weight: bold;
            color: #ffd966;
            opacity: 0.6;
        }

        .card.front {
            background: #fff9ef;
            flex-direction: column;
            justify-content: center;
        }

        .card.front img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 5px;
        }

        .card-word {
            font-weight: bold;
            font-size: 0.9rem;
        }

        .card-phonetic {
            font-size: 0.7rem;
            color: #3366ff;
            font-family: monospace;
        }

        .card-chinese {
            font-size: 0.7rem;
            color: #2e7d32;
        }

        .card.eliminated {
            visibility: hidden;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.8);
            transition: 0.2s;
        }

        .explosion-effect {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            pointer-events: none;
            z-index: 1000;
            animation: boom 0.4s ease-out forwards;
        }

        @keyframes boom {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.3);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(2.2);
            }
        }

        .message {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 10px;
            color: #ffeaac;
        }

        .back-btn {
            background: #ffaa33;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .card.front img {
                width: 40px;
                height: 40px;
            }

            .card-word {
                font-size: 0.7rem;
            }

            .card-phonetic,
            .card-chinese {
                font-size: 0.6rem;
            }
        }
    </style>
</head>

<body>
    <div class="game-container">
        <header>
            <h1><i class="fas fa-memory"></i> Crash Game · 对对碰</h1>
            <p>点击卡片配对单词，挑战最快记录！</p>
        </header>

        <div class="level-bar" id="levelBar">
            <button class="level-btn" data-level="0">2x3</button>
            <button class="level-btn" data-level="1">3x4</button>
            <button class="level-btn" data-level="2">4x5</button>
            <button class="level-btn" data-level="3">5x6</button>
            <button class="level-btn" data-level="4">6x7</button>
            <button class="level-btn" data-level="5">7x8</button>
        </div>

        <div class="info-area">
            <div class="timer-box">⏱️ 用时: <span id="timerDisplay" class="timer-value">0</span><span> 秒</span></div>
            <div class="best-box">🏆 最快记录: <span id="bestDisplay" class="best-value">—</span></div>
        </div>

        <div id="gridContainer" class="grid"></div>

        <div id="gameMessage" class="message"></div>

        <div style="text-align:center; margin-top:15px; display:flex; justify-content:center; gap:15px;">
            <button id="playAgainBtn" class="back-btn" style="background:#4caf50; display:none;">🔄 再玩一次</button>
            <button id="backToMenuBtn" class="back-btn"><i class="fas fa-arrow-left"></i> 返回菜单</button>
        </div>
    </div>

    <audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"
        preload="auto"></audio>
    <audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3"
        preload="auto"></audio>

    <script src="wordData.js"></script>
    <script src="wordlistConfig.js"></script>
    <script src="crash.js"></script>
</body>

</html>
