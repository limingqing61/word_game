<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
    <title>Word List</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .word-list-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .word-list-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .word-list-header h1 {
            color: #ff3366;
            font-size: 3rem;
            text-shadow: 3px 3px 0 #ffcc00;
        }
        .word-list-header p {
            font-size: 1.5rem;
            color: #3366ff;
            font-weight: bold;
        }
        .word-list-table {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .word-list-row {
            display: flex;
            align-items: center;
            gap: 20px;
            background: white;
            border-radius: 15px;
            padding: 15px 25px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            border: 2px solid #4fc3f7;
        }
        .word-list-row img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 10px;
        }
        .word-list-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .word-list-word {
            font-size: 1.8rem;
            font-weight: bold;
            color: #333;
        }
        .word-list-phonetic {
            font-size: 1.4rem;
            color: #3366ff;
            font-weight: bold;
            font-family: 'Arial', sans-serif;
        }
        
        .word-list-chinese {
            font-size: 1.4rem;
            color: #4CAF50;
            font-weight: bold;
            margin-top: 4px;
        }
        .word-list-play-btn {
            background: linear-gradient(to right, #2196F3, #03A9F4);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }
        .word-list-play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .word-list-play-btn i {
            font-size: 1.8rem;
        }
        .back-btn-container {
            text-align: center;
            margin-top: 30px;
        }
        @media (max-width: 768px) {
            .word-list-row {
                flex-wrap: wrap;
                gap: 10px;
            }
            .word-list-row img {
                width: 60px;
                height: 60px;
            }
            .word-list-word {
                font-size: 1.4rem;
            }
            .word-list-phonetic {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="word-list-container">
            <div class="word-list-header">
                <h1><i class="fas fa-list"></i> Word List</h1>
                <p>All words with images and pronunciation</p>
            </div>
            <div id="wordListTable" class="word-list-table">
                <!-- Generated by JavaScript -->
            </div>
            <div class="back-btn-container">
                <button id="backToMenuBtn" class="back-btn" style="display:inline-flex;">
                    <i class="fas fa-arrow-left"></i> Back to Menu
                </button>
            </div>
        </div>
    </div>
    <div id="imageZoomOverlay">
        <img id="zoomImage" src="" alt="">
    </div>
    <script src="wordlist.js"></script>
</body>
</html>
