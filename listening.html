<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎧</text></svg>">
    <title>Word Game - Listening Mode</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Additional styles for listening mode */
        .question-mark {
            font-size: 8rem;
            color: #ff3366;
            text-shadow: 5px 5px 0 #ffcc00;
            animation: pulse 2s infinite;
        }

        .choices-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .choices-grid-6 {
            grid-template-columns: repeat(3, 1fr);
        }

        .choice-item {
            background: white;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border: 5px solid #4fc3f7;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .choice-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .choice-item img {
            width: 100%;
            height: 150px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .choice-item .word-details {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            visibility: visible;
            min-height: 2em;
        }

        .choice-item .word-label,
        .choice-item .word-phonetic {
            visibility: hidden;
        }

        .choice-item.revealed .word-label,
        .choice-item.revealed .word-phonetic {
            visibility: visible;
        }

        .choice-item .word-label {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
        }

        .choice-item .word-phonetic {
            font-size: 1.2rem;
            color: #3366ff;
            font-weight: bold;
        }

        .choice-item .word-chinese {
            font-size: 1.2rem;
            color: #4CAF50;
            font-weight: bold;
        }

        .choice-item.revealed .word-details {
            visibility: visible;
        }

        .choice-item.correct {
            border-color: #4CAF50;
            background: #e8f5e9;
        }

        .choice-item.correct .word-label {
            color: #2e7d32;
        }

        .choice-item.wrong {
            border-color: #F44336;
            background: #ffebee;
        }

        .choice-item.wrong .word-label {
            color: #c62828;
        }

        .choice-item.disabled {
            pointer-events: none;
            opacity: 0.6;
        }

        .choice-item.eliminated {
            opacity: 0.3;
            pointer-events: none;
        }

        .result-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 2rem;
            z-index: 10;
        }

        .result-icon.correct {
            color: #4CAF50;
        }

        .result-icon.wrong {
            color: #F44336;
        }

        /* --- 新的布局样式：统计区（右侧） + 操作区（左侧） 同一行 --- */
        .game-info-stats-row {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        /* 操作区容器（左侧） */
        .actions-wrapper {
            flex-shrink: 0;
            order: 1;
        }

        /* 统计区容器（右侧） */
        .stats-wrapper {
            flex-shrink: 0;
            order: 2;
        }

        /* 统计区水平排列 */
        .score-board-listensing-horizontal {
            display: flex;
            flex-direction: row;
            gap: 32px;
            background: rgba(0, 0, 0, 0.03);
            padding: 8px 24px;
            border-radius: 60px;
        }

        .score-item-listening {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-label-listening {
            font-size: 1rem;
            color: #555;
            margin-bottom: 5px;
        }

        .score-value-listening {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .score-value-listening.correct {
            color: #4CAF50;
        }

        .score-value-listening.wrong {
            color: #F44336;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, #4CAF50, #8BC34A);
            border-radius: 5px;
            transition: width 0.5s ease;
        }

        /* 按钮组 */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 0;
            margin: 0;
            flex-wrap: nowrap;
        }

        .repeat-btn {
            background: linear-gradient(to right, #2196F3, #03A9F4);
            color: white;
            padding: 10px 15px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            flex: 1;
            min-width: 80px;
            max-width: 150px;
        }

        .repeat-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
        }

        .back-btn {
            background: linear-gradient(to right, #607D8B, #455A64);
            color: white;
            padding: 10px 15px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            flex: 1;
            min-width: 60px;
            max-width: 120px;
        }

        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
        }

        .slow-play-btn {
            background: linear-gradient(to right, #9C27B0, #673AB7);
            color: white;
            padding: 10px 15px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            flex: 1;
            min-width: 60px;
            max-width: 120px;
        }

        .slow-play-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
        }

        .slow-play-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .hint-btn-listening {
            background: linear-gradient(to right, #FF9800, #FFC107);
            color: white;
            padding: 10px 15px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            flex: 1;
            min-width: 60px;
            max-width: 120px;
        }

        .hint-btn-listening:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
        }

        .hint-btn-listening:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .game-complete {
            text-align: center;
            padding: 40px;
        }

        .game-complete h2 {
            font-size: 3rem;
            color: #ff3366;
            margin-bottom: 20px;
        }

        .game-complete .final-score {
            font-size: 2rem;
            margin-bottom: 30px;
        }

        .game-complete .final-score .correct {
            color: #4CAF50;
        }

        .game-complete .final-score .wrong {
            color: #F44336;
        }

        .wrong-words-section {
            background: #fff3e0;
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            border: 3px solid #FF9800;
            max-height: 600px;
            overflow-y: auto;
        }

        .wrong-words-section h3 {
            color: #E65100;
            font-size: 2.2rem;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            background: #fff3e0;
            padding-bottom: 10px;
            z-index: 1;
        }

        .wrong-words-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .wrong-word-item {
            display: flex;
            align-items: center;
            gap: 20px;
            background: white;
            border-radius: 15px;
            padding: 15px 25px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            border: 2px solid #FF9800;
            width: 100%;
        }

        .wrong-word-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .wrong-word-info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .wrong-word-text {
            font-size: 1.8rem;
            font-weight: bold;
            color: #333;
        }

        .wrong-word-phonetic {
            font-size: 1.4rem;
            color: #3366ff;
            font-weight: bold;
            font-family: 'Arial', sans-serif;
        }

        .wrong-word-play-btn {
            background: linear-gradient(to right, #2196F3, #03A9F4);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
        }

        .wrong-word-play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .wrong-word-play-btn i {
            font-size: 1.8rem;
        }

        /* 错题本收藏按钮样式 */
        .wrong-word-buttons {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .wrong-word-fav-btn {
            background: #28a745;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
        }

        .wrong-word-fav-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .wrong-word-fav-btn:active {
            transform: scale(0.95);
        }

        .wrong-word-fav-btn i {
            color: white;
            font-size: 1.2rem;
        }

        /* 启动遮罩层样式 */
        #startOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        #startOverlay h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.3);
        }

        #startOverlay .subtitle {
            font-size: 1.2rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        #startBtn {
            background: #ff6b6b;
            border: none;
            padding: 16px 48px;
            font-size: 1.8rem;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 0 #c04e4e;
            transition: 0.05s linear;
        }

        #startBtn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #c04e4e;
        }

        #startOverlay .tip {
            margin-top: 40px;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .choices-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .question-mark {
                font-size: 5rem;
            }

            .choice-item img {
                height: 100px;
            }

            .action-buttons {
                gap: 8px;
            }

            .repeat-btn,
            .back-btn,
            .hint-btn-listening,
            .slow-play-btn {
                padding: 8px 12px;
                font-size: 0.8rem;
                min-width: 70px;
            }

            #startOverlay h1 {
                font-size: 2rem;
            }

            #startBtn {
                font-size: 1.3rem;
                padding: 12px 32px;
            }
        }
    </style>
</head>

<body>
    <!-- 启动遮罩层 -->
    <div id="startOverlay">
        <h1>🎧 Listening Challenge</h1>
        <div class="subtitle">👂 听音识图 · 挑战你的听力</div>
        <button id="startBtn">🔊 点击开始游戏</button>
        <div class="tip">💡 需要点击按钮以启用音频和语音</div>
    </div>

    <div class="container" style="display: none;" id="gameContainer">
        <header>
            <h1><i class="fas fa-headphones"></i> Listening Challenge <i class="fas fa-headphones"></i></h1>
            <p class="subtitle">Listen and choose the correct picture!</p>
        </header>

        <div class="game-info-stats-row">
            <div class="actions-wrapper">
                <div class="action-buttons">
                    <button id="repeatBtn" class="repeat-btn">
                        <i class="fas fa-volume-up"></i> Listen Again
                    </button>
                    <button id="slowPlayBtn" class="slow-play-btn">
                        <i class="fas fa-turtle"></i> Slow Play
                    </button>
                    <button id="hintBtnListening" class="hint-btn-listening">
                        <i class="fas fa-lightbulb"></i> Hint
                    </button>
                    <button id="backBtn" class="back-btn">
                        <i class="fas fa-arrow-left"></i> Back
                    </button>
                </div>
            </div>

            <div class="stats-wrapper">
                <div class="score-board-listensing-horizontal">
                    <div class="score-item-listening">
                        <span class="score-label-listening">Correct:</span>
                        <span id="correctCount" class="score-value-listening correct">0</span>
                    </div>
                    <div class="score-item-listening">
                        <span class="score-label-listening">Wrong:</span>
                        <span id="wrongCount" class="score-value-listening wrong">0</span>
                    </div>
                    <div class="score-item-listening">
                        <span class="score-label-listening">Progress:</span>
                        <span id="progressCount" class="score-value-listening">0/24</span>
                    </div>
                    <div class="score-item-listening">
                        <span class="score-label-listening">Score:</span>
                        <span id="totalScore" class="score-value-listening">0</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="progress-bar">
            <div id="progressFill" class="progress-fill" style="width: 0%"></div>
        </div>

        <div class="game-area">
            <div class="choices-grid" id="choicesGrid">
                <!-- Choices will be generated by JavaScript -->
            </div>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="wordData.js"></script>
    <script src="wordlistConfig.js"></script>
    <script src="wordlist.js"></script>
    <script src="listening.js"></script>
</body>

</html>
