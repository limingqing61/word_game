<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Game - Listening Mode</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Additional styles for listening mode */
        .question-mark {
            font-size: 8rem;
            color: #ff3366;
            text-shadow: 5px 5px 0 #ffcc00;
            animation: pulse 2s infinite;
        }
        
        .choices-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }
        
        .choice-item {
            background: white;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border: 5px solid #4fc3f7;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .choice-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .choice-item img {
            width: 100%;
            height: 150px;
            object-fit: contain;
            margin-bottom: 10px;
        }
        
        .choice-item .word-label {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            display: none;
        }
        
        .choice-item.revealed .word-label {
            display: block;
        }
        
        .choice-item.correct {
            border-color: #4CAF50;
            background: #e8f5e9;
        }
        
        .choice-item.correct .word-label {
            color: #2e7d32;
        }
        
        .choice-item.wrong {
            border-color: #F44336;
            background: #ffebee;
        }
        
        .choice-item.wrong .word-label {
            color: #c62828;
        }
        
        .choice-item.disabled {
            pointer-events: none;
            opacity: 0.6;
        }
        
        .choice-item.eliminated {
            opacity: 0.3;
            pointer-events: none;
        }
        
        .result-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 2rem;
            z-index: 10;
        }
        
        .result-icon.correct {
            color: #4CAF50;
        }
        
        .result-icon.wrong {
            color: #F44336;
        }
        
        .score-board-listening {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .score-item-listening {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .score-label-listening {
            font-size: 1.5rem;
            color: #555;
            margin-bottom: 5px;
        }
        
        .score-value-listening {
            font-size: 3rem;
            font-weight: bold;
        }
        
        .score-value-listening.correct {
            color: #4CAF50;
        }
        
        .score-value-listening.wrong {
            color: #F44336;
        }
        
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, #4CAF50, #8BC34A);
            border-radius: 5px;
            transition: width 0.5s ease;
        }
        
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 15px 10px;
            flex-wrap: wrap;
        }
        
        .repeat-btn {
            background: linear-gradient(to right, #2196F3, #03A9F4);
            color: white;
            padding: 12px 20px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            flex: 1;
            min-width: 120px;
            max-width: 200px;
        }
        
        .repeat-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
        }
        
        .back-btn {
            background: linear-gradient(to right, #607D8B, #455A64);
            color: white;
            padding: 12px 20px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            flex: 1;
            min-width: 100px;
            max-width: 160px;
        }
        
        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
        }
        
        .hint-btn-listening {
            background: linear-gradient(to right, #FF9800, #FFC107);
            color: white;
            padding: 12px 20px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            flex: 1;
            min-width: 100px;
            max-width: 160px;
        }
        
        .hint-btn-listening:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
        }
        
        .hint-btn-listening:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .game-complete {
            text-align: center;
            padding: 40px;
        }
        
        .game-complete h2 {
            font-size: 3rem;
            color: #ff3366;
            margin-bottom: 20px;
        }
        
        .game-complete .final-score {
            font-size: 2rem;
            margin-bottom: 30px;
        }
        
        .game-complete .final-score .correct {
            color: #4CAF50;
        }
        
        .game-complete .final-score .wrong {
            color: #F44336;
        }
        
        .wrong-words-section {
            background: #fff3e0;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            border: 3px solid #FF9800;
        }
        
        .wrong-words-section h3 {
            color: #E65100;
            font-size: 1.8rem;
            margin-bottom: 15px;
        }
        
        .wrong-words-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        .wrong-word-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            border-radius: 15px;
            padding: 10px 15px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid #FF9800;
        }
        
        .wrong-word-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .wrong-word-item span {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
        }
        
        @media (max-width: 768px) {
            .choices-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            
            .question-mark {
                font-size: 5rem;
            }
            
            .choice-item img {
                height: 100px;
            }
            
            .action-buttons {
                gap: 10px;
                padding: 10px 5px;
            }
            
            .repeat-btn,
            .back-btn,
            .hint-btn-listening {
                padding: 10px 15px;
                font-size: 1rem;
                min-width: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-headphones"></i> Listening Challenge <i class="fas fa-headphones"></i></h1>
            <p class="subtitle">Listen and choose the correct picture!</p>
        </header>

        <div class="game-info">
            <div class="score-board-listening">
                <div class="score-item-listening">
                    <span class="score-label-listening">Correct:</span>
                    <span id="correctCount" class="score-value-listening correct">0</span>
                </div>
                <div class="score-item-listening">
                    <span class="score-label-listening">Wrong:</span>
                    <span id="wrongCount" class="score-value-listening wrong">0</span>
                </div>
                <div class="score-item-listening">
                    <span class="score-label-listening">Progress:</span>
                    <span id="progressCount" class="score-value-listening">0/24</span>
                </div>
            </div>
            
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill" style="width: 0%"></div>
            </div>
        </div>

        <div class="game-area">
            <div class="current-word">
                <div class="word-card">
                    <div class="image-container" id="questionContainer">
                        <div class="question-mark">?</div>
                    </div>
                    <!-- Buttons moved below the image -->
                    <div class="action-buttons">
                        <button id="repeatBtn" class="repeat-btn">
                            <i class="fas fa-volume-up"></i> Listen Again
                        </button>
                        <button id="hintBtnListening" class="hint-btn-listening">
                            <i class="fas fa-lightbulb"></i> Hint
                        </button>
                        <button id="backBtn" class="back-btn">
                            <i class="fas fa-arrow-left"></i> Back
                        </button>
                    </div>
                </div>
            </div>

            <div class="choices-grid" id="choicesGrid">
                <!-- Choices will be generated by JavaScript -->
            </div>
        </div>
    </div>

    <script src="listening.js"></script>
</body>
</html>
