<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Music Box · 音阶小琴</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            max-width: 850px;
            width: 100%;
            background: rgba(30, 50, 30, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 60px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
        }

        header {
            text-align: center;
            color: #FFE484;
            text-shadow: 4px 4px 0 #B45309;
        }

        header h1 {
            font-size: 1.8rem;
            margin: 0;
        }

        header p {
            font-size: 0.85rem;
            opacity: 0.9;
            margin: 2px 0 0;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #31220e;
            padding: 8px 16px;
            border-radius: 50px;
            margin: 12px 0;
            color: #ffecb3;
            flex-wrap: wrap;
            gap: 6px;
        }

        .mode-buttons {
            display: flex;
            gap: 8px;
        }

        .mode-btn {
            background: #ffaa33;
            border: none;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #b97f44;
            font-family: inherit;
        }

        .mode-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #b97f44;
        }

        .mode-btn.active {
            background: #4CAF50;
            color: white;
            box-shadow: 0 3px 0 #2e7d32;
        }

        .range-selector {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            padding: 4px 8px;
        }

        .range-label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            color: #ffecb3;
            cursor: pointer;
            padding: 2px 10px;
            border-radius: 20px;
            transition: 0.1s;
        }

        .range-label:has(input:checked) {
            background: rgba(255, 170, 51, 0.3);
            color: #ffd966;
        }

        .range-label input[type="radio"] {
            accent-color: #ffaa33;
            width: 14px;
            height: 14px;
            cursor: pointer;
        }

        .song-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .song-selector select {
            padding: 4px 12px;
            border-radius: 30px;
            border: none;
            font-family: inherit;
            font-weight: bold;
            background: #fef3c7;
            font-size: 0.85rem;
            max-width: 160px;
        }

        .play-btn {
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 4px 14px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            box-shadow: 0 3px 0 #2e7d32;
        }

        .play-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #2e7d32;
        }

        /* 乐谱区域 */
        .sheet-area {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 30px;
            padding: 15px;
            margin-bottom: 15px;
            min-height: 120px;
        }

        .song-title-display {
            text-align: center;
            color: #ffd966;
            font-size: 1rem;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .lyric-line {
            text-align: center;
            color: #ffecb3;
            font-size: 1.1rem;
            min-height: 2rem;
            margin-bottom: 4px;
        }

        .notes-line {
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
            color: #fff;
            letter-spacing: 2px;
            min-height: 3rem;
            display: flex;
            justify-content: center;
            gap: 4px;
            flex-wrap: wrap;
        }

        .note-slot {
            display: inline-block;
            width: 42px;
            padding: 4px 0;
            border-radius: 10px;
            text-align: center;
            font-size: 1.4rem;
            transition: 0.1s;
        }

        .note-slot.active {
            color: #ffaa33;
            background: rgba(255, 170, 51, 0.3);
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255, 170, 51, 0.4);
        }

        .note-slot.done {
            color: #4CAF50;
            background: rgba(76, 175, 80, 0.2);
        }

        .note-slot.error {
            color: #F44336;
            background: rgba(244, 67, 54, 0.3);
            animation: shake 0.3s;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-8px);
            }

            75% {
                transform: translateX(8px);
            }
        }

        .progress-info {
            text-align: center;
            color: #ffecb3;
            font-size: 0.85rem;
            margin-top: 6px;
        }

        /* 琴键容器 */
        .keys-container {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin: 15px 0 10px;
            flex-wrap: wrap;
        }

        .key {
            flex: 1;
            min-width: 44px;
            max-width: 76px;
            aspect-ratio: 1 / 1.2;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 0 rgba(0, 0, 0, 0.3), inset 0 -3px 0 rgba(0, 0, 0, 0.1);
            transition: 0.05s linear;
            font-weight: bold;
            font-size: 1rem;
            color: #333;
            border: 2px solid rgba(255, 255, 255, 0.2);
            position: relative;
        }

        .key:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.3);
        }

        .key .key-note {
            font-size: 1.3rem;
            font-weight: bold;
        }

        .key .key-label {
            font-size: 0.6rem;
            opacity: 0.7;
            margin-top: 1px;
        }

        .key.highlight {
            box-shadow: 0 0 20px rgba(255, 170, 51, 0.8), 0 5px 0 rgba(0, 0, 0, 0.3);
        }

        .key.flash-green {
            animation: flashGreen 0.3s;
        }

        .key.flash-red {
            animation: flashRed 0.3s;
        }

        @keyframes flashGreen {

            0%,
            100% {
                box-shadow: 0 5px 0 rgba(0, 0, 0, 0.3);
            }

            50% {
                box-shadow: 0 0 30px rgba(76, 175, 80, 0.9), 0 5px 0 rgba(0, 0, 0, 0.3);
                background: rgba(76, 175, 80, 0.5);
            }
        }

        @keyframes flashRed {

            0%,
            100% {
                box-shadow: 0 5px 0 rgba(0, 0, 0, 0.3);
            }

            50% {
                box-shadow: 0 0 30px rgba(244, 67, 54, 0.9), 0 5px 0 rgba(0, 0, 0, 0.3);
                background: rgba(244, 67, 54, 0.5);
            }
        }

        /* 颜色方案 - 中音区 */
        .key-1 {
            background: #FF6B6B;
            color: #fff;
        }

        .key-2 {
            background: #FF9F43;
            color: #fff;
        }

        .key-3 {
            background: #FECA57;
            color: #333;
        }

        .key-4 {
            background: #4ECDC4;
            color: #fff;
        }

        .key-5 {
            background: #54A0FF;
            color: #fff;
        }

        .key-6 {
            background: #A29BFE;
            color: #fff;
        }

        .key-7 {
            background: #FD79A8;
            color: #fff;
        }

        .key-8 {
            background: #DFE6E9;
            color: #333;
        }

        /* 低音区 - 深色系 */
        .key-low {
            background: #2d2d44;
            color: #aaddff;
            border-color: rgba(100, 150, 255, 0.3);
        }

        .key-low .key-label {
            color: #88bbdd;
        }

        /* 高音区 - 浅色系 */
        .key-high {
            background: #f0f0f5;
            color: #333;
            border-color: rgba(200, 200, 255, 0.3);
        }

        .key-high .key-label {
            color: #666;
        }

        /* 音区标签 */
        .key-zone-label {
            font-size: 0.6rem;
            color: #ffecb3;
            opacity: 0.5;
            text-align: center;
            margin: 4px 0 2px;
            letter-spacing: 2px;
        }

        .message-area {
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            min-height: 2.2rem;
            color: #ffeaac;
            margin-top: 8px;
        }

        .message-area.error {
            color: #ff6b6b;
        }

        .message-area.success {
            color: #a5ffa5;
        }

        /* 完成弹窗 */
        .complete-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 20000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .complete-overlay h2 {
            font-size: 2.5rem;
            color: #ffd966;
            margin-bottom: 10px;
        }

        .complete-overlay .sub {
            font-size: 1.2rem;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .complete-overlay button {
            background: #ffaa33;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin: 8px;
            font-family: inherit;
            box-shadow: 0 4px 0 #b97f44;
        }

        .complete-overlay button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b97f44;
        }

        .complete-overlay .home-btn {
            background: #607d8b;
            color: white;
            box-shadow: 0 4px 0 #455a64;
        }

        /* 启动遮罩 */
        #startOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a472a 0%, #0e2a1a 100%);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            text-align: center;
        }

        #startOverlay h1 {
            font-size: 2.5rem;
            text-shadow: 4px 4px 0 #b45309;
        }

        #startBtn {
            background: #ffaa33;
            border: none;
            padding: 16px 48px;
            font-size: 1.5rem;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 0 #b97f44;
            font-family: inherit;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .keys-container {
                gap: 4px;
            }

            .key {
                min-width: 32px;
                max-width: 52px;
                font-size: 0.7rem;
                border-radius: 10px;
            }

            .key .key-note {
                font-size: 0.9rem;
            }

            .key .key-label {
                font-size: 0.5rem;
            }

            .note-slot {
                width: 30px;
                font-size: 1rem;
            }

            .notes-line {
                font-size: 1rem;
                letter-spacing: 1px;
            }

            header h1 {
                font-size: 1.3rem;
            }

            .top-bar {
                font-size: 0.7rem;
                padding: 6px 10px;
            }

            .mode-btn {
                font-size: 0.65rem;
                padding: 3px 10px;
            }

            .range-label {
                font-size: 0.65rem;
                padding: 2px 6px;
            }

            .song-selector select {
                font-size: 0.7rem;
                max-width: 120px;
                padding: 2px 8px;
            }

            .complete-overlay h2 {
                font-size: 1.8rem;
            }

            .lyric-line {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <div id="startOverlay">
        <h1>🎵 Music Box</h1>
        <div style="margin-bottom: 20px;">🎹 音阶小琴 · 弹奏儿歌</div>
        <button id="startBtn">🔊 开始弹奏</button>
    </div>

    <div class="game-container" id="gameContainer" style="display: none;">
        <header>
            <h1><i class="fas fa-music"></i> Music Box <i class="fas fa-music"></i></h1>
            <p>🎹 点击琴键 · 弹奏儿歌</p>
        </header>

        <div class="top-bar">
            <div class="mode-buttons">
                <button id="freeModeBtn" class="mode-btn active">🎵 自由弹奏</button>
                <button id="learnModeBtn" class="mode-btn">📖 跟谱练习</button>
            </div>
            <div class="song-selector" id="songSelector">
                <label style="font-size:0.85rem;">🎤</label>
                <select id="songSelect"></select>
            </div>
        </div>

        <div class="sheet-area" id="sheetArea">
            <div class="song-title-display" id="songTitleDisplay">🎶 自由弹奏</div>
            <div class="lyric-line" id="lyricLine"></div>
            <div class="notes-line" id="notesLine"></div>
            <div class="progress-info" id="progressInfo"></div>
        </div>

        <div class="keys-container" id="keysContainer"></div>

        <div class="message-area" id="messageArea">💡 点击琴键开始演奏</div>

        <div style="text-align:center; margin-top:12px;">
            <button id="backBtn" class="back-btn"
                style="background:#607d8b;border:none;padding:8px 24px;border-radius:40px;font-weight:bold;cursor:pointer;color:white;"><i
                    class="fas fa-home"></i> 返回主页</button>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="musicData.js"></script>
    <script src="musicBox.js"></script>
</body>

</html>
