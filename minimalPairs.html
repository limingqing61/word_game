<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>相近单词分组 · 最小对立对 | 英语学习</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: #f1f5f9;
            padding: 20px;
            color: #1e293b;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .page-header {
            background: white;
            border-radius: 32px;
            padding: 18px 28px;
            margin-bottom: 28px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .title-section h1 {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .title-section p {
            color: #5b6e8c;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .back-btn-wrapper {
            margin-top: 30px;
            text-align: center;
        }

        #backToMenuBtn {
            background: #eef2ff;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #2c3e66;
            transition: 0.2s;
            font-size: 1rem;
        }

        #backToMenuBtn:hover {
            background: #e0e7ff;
            transform: translateX(-3px);
        }

        .back-btn {
            background: #eef2ff;
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #2c3e66;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: #e0e7ff;
            transform: translateX(-3px);
        }

        .info-bar {
            background: #fef9e3;
            border-left: 5px solid #f59e0b;
            border-radius: 16px;
            padding: 12px 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 0.9rem;
            color: #92400e;
        }

        .info-bar i {
            font-size: 1.2rem;
        }

        .groups-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .minimal-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border: 1px solid #e9eef3;
        }

        .card-header {
            background: linear-gradient(135deg, #f8fafc, #ffffff);
            padding: 16px 24px;
            border-bottom: 2px solid #e2e8f0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header:hover {
            background: #f1f5f9;
        }

        .pair-title {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .sound-badge {
            background: #dbeafe;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #1e40af;
            font-family: monospace;
        }

        .example-word {
            background: #e6f0ff;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.85rem;
            color: #1e4a76;
        }

        .word-count {
            background: #cbd5e1;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #334155;
        }

        .toggle-icon {
            color: #6c86a3;
        }

        .words-list {
            display: flex;
            flex-direction: column;
        }

        .word-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            border-bottom: 1px solid #f0f2f5;
            transition: background 0.15s;
        }

        .word-row:hover {
            background: #fafcff;
        }

        .word-img {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            object-fit: cover;
            background: #eef2ff;
            cursor: pointer;
            flex-shrink: 0;
            border: 1px solid #e2e8f0;
        }

        .word-img:hover {
            transform: scale(1.02);
        }

        .word-info {
            flex: 1;
            margin-left: 16px;
        }

        .word-main {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 5px;
        }

        .word-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f172a;
        }

        .word-phonetic {
            font-size: 0.75rem;
            font-family: 'Courier New', monospace;
            background: #eef2ff;
            padding: 2px 10px;
            border-radius: 30px;
            color: #3b5e8b;
        }

        .word-chinese {
            font-size: 0.85rem;
            color: #546a7a;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            margin-left: 12px;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn.speak {
            background: #eef2ff;
            color: #2563eb;
        }

        .action-btn.speak:hover {
            background: #d9e6ff;
        }

        .action-btn.fav {
            background: #fff0e6;
            color: #e67e22;
        }

        .action-btn.fav:hover {
            background: #ffe0c4;
        }

        .action-btn.fav.active {
            background: #fde68a;
            color: #b45309;
        }

        .empty-group-msg {
            text-align: center;
            padding: 50px;
            color: #94a3b8;
            background: white;
            border-radius: 28px;
        }

        .favorites-dialog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .favorites-dialog {
            background: white;
            border-radius: 28px;
            padding: 24px;
            width: 90%;
            max-width: 340px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2);
        }

        .toast-message {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            z-index: 10001;
            font-size: 0.9rem;
            pointer-events: none;
        }

        @media (max-width: 700px) {
            .word-row {
                flex-wrap: wrap;
                gap: 12px;
            }

            .word-img {
                width: 48px;
                height: 48px;
            }

            .action-buttons {
                margin-left: auto;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="page-header">
            <div class="title-section">
                <h1><i class="fas fa-code-branch"></i> 相近单词分组</h1>
                <p>📖 最小对立对 · 每组元音完全一致，通过替换辅音练习辨音</p>
            </div>
        </div>

        <div class="info-bar">
            <i class="fas fa-lightbulb"></i>
            <span>✨ 每组单词具有相同的元音发音，通过变换首辅音或尾辅音形成相近词。点击图片可放大，⭐ 收藏夹与主单词表完全同步。</span>
        </div>

        <div id="groupsContainer" class="groups-container">
            <div style="text-align:center; padding:60px;">📡 正在加载相近词分组数据...</div>
        </div>
        <div class="back-btn-wrapper">
            <button id="backToMenuBtn">← 返回首页</button>
        </div>
    </div>

    <!-- 依赖脚本 -->
    <script src="utils.js"></script>
    <script src="wordData.js"></script>
    <script src="wordlistConfig.js"></script>
    <script src="minimalPairsData.js"></script>
    <script src="minimalPairs.js"></script>
</body>

</html>
