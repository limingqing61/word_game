<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✏️</text></svg>">
    <title>Word Game - Spelling Mode</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Additional spelling-specific styles */
        .spelling-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }
        .spelling-question {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 5px solid #4fc3f7;
            max-width: 500px;
            width: 100%;
        }
        .spelling-question img {
            width: 150px;
            height: 150px;
            object-fit: contain;
            margin-bottom: 10px;
        }
        .spelling-chinese {
            font-size: 1.5rem;
            color: #4CAF50;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .spelling-pronounce-btn {
            background: linear-gradient(to right, #4fc3f7, #29b6f6);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 10px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .spelling-pronounce-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .spelling-word {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }
        .spelling-consonant {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 30px;
        }
        .spelling-input {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 50px;
            border: none;
            border-bottom: 4px solid #4fc3f7;
            background: transparent;
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
            text-align: center;
            outline: none;
            caret-color: #4fc3f7;
        }
        .spelling-input:focus {
            border-bottom-color: #FF9800;
        }
        .spelling-input.correct {
            border-bottom-color: #4CAF50;
            color: #4CAF50;
        }
        .spelling-input.wrong {
            border-bottom-color: #F44336;
            color: #F44336;
        }
        .spelling-score-board {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 20px 0;
        }
        .spelling-score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .spelling-score-label {
            font-size: 1.2rem;
            color: #555;
        }
        .spelling-score-value {
            font-size: 2rem;
            font-weight: bold;
        }
        .spelling-score-value.correct {
            color: #4CAF50;
        }
        .spelling-score-value.wrong {
            color: #F44336;
        }
        .spelling-score-value.score {
            color: #ff3366;
        }
        .spelling-round-info {
            text-align: center;
            font-size: 1.5rem;
            color: #3366ff;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-pencil-alt"></i> Spelling Mode <i class="fas fa-pencil-alt"></i></h1>
            <p class="subtitle">Fill in the missing vowels to spell the word!</p>
        </header>

        <div id="scoreArea" class="spelling-score-board">
            <div class="spelling-score-item">
                <span class="spelling-score-label">Correct:</span>
                <span id="correctCount" class="spelling-score-value correct">0</span>
            </div>
            <div class="spelling-score-item">
                <span class="spelling-score-label">Wrong:</span>
                <span id="wrongCount" class="spelling-score-value wrong">0</span>
            </div>
            <div class="spelling-score-item">
                <span class="spelling-score-label">Score:</span>
                <span id="totalScore" class="spelling-score-value score">0</span>
            </div>
            <div class="spelling-score-item">
                <span class="spelling-score-label">Progress:</span>
                <span id="progressCount" class="spelling-score-value">0/25</span>
            </div>
        </div>

        <div class="progress-bar">
            <div id="progressFill" class="progress-fill" style="width: 0%"></div>
        </div>

        <div id="roundInfo" class="spelling-round-info">Question 1: Spell the word</div>

        <div id="spellingContainer" class="spelling-container">
            <!-- Question will be generated by JavaScript -->
        </div>

        <div style="text-align:center; margin-top:20px;">
            <button id="backBtn" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back
            </button>
        </div>
    </div>

    <script src="wordData.js"></script>
    <script src="wordlistConfig.js"></script>
    <script src="spelling.js"></script>
</body>
</html>
