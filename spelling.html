<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✏️</text></svg>">
    <title>Word Game - Spelling Mode</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Additional spelling-specific styles */
        .spelling-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        .spelling-question {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border: 5px solid #4fc3f7;
            max-width: 500px;
            width: 100%;
        }

        .spelling-question img {
            width: 150px;
            height: 150px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .spelling-chinese {
            font-size: 1.5rem;
            color: #4CAF50;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .spelling-pronounce-btn {
            background: linear-gradient(to right, #4fc3f7, #29b6f6);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 10px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .spelling-pronounce-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .spelling-word {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .spelling-consonant {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 30px;
        }

        .spelling-input {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 50px;
            border: none;
            border-bottom: 4px solid #4fc3f7;
            background: transparent;
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
            text-align: center;
            outline: none;
            caret-color: #4fc3f7;
        }

        .spelling-input:focus {
            border-bottom-color: #FF9800;
        }

        .spelling-input.correct {
            border-bottom-color: #4CAF50;
            color: #4CAF50;
        }

        .spelling-input.wrong {
            border-bottom-color: #F44336;
            color: #F44336;
        }

        .spelling-score-board {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 20px 0;
        }

        .spelling-score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .spelling-score-label {
            font-size: 1.2rem;
            color: #555;
        }

        .spelling-score-value {
            font-size: 2rem;
            font-weight: bold;
        }

        .spelling-score-value.correct {
            color: #4CAF50;
        }

        .spelling-score-value.wrong {
            color: #F44336;
        }

        .spelling-score-value.score {
            color: #ff3366;
        }

        .spelling-round-info {
            text-align: center;
            font-size: 1.5rem;
            color: #3366ff;
            margin: 20px 0;
        }

        /* 错题本样式 */
        .wrong-words-section {
            background: #fff3e0;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            border: 3px solid #FF9800;
            max-height: 500px;
            overflow-y: auto;
        }

        .wrong-words-section h3 {
            color: #E65100;
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        .wrong-words-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .wrong-word-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: white;
            border-radius: 15px;
            padding: 12px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border: 2px solid #FF9800;
        }

        .wrong-word-item img {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        .wrong-word-info {
            flex: 1;
        }

        .wrong-word-text {
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
        }

        .wrong-word-phonetic {
            font-size: 0.9rem;
            color: #3366ff;
        }

        .wrong-word-chinese {
            font-size: 0.9rem;
            color: #4CAF50;
        }

        .wrong-word-buttons {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .wrong-word-play-btn {
            background: linear-gradient(to right, #2196F3, #03A9F4);
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s linear;
        }

        .wrong-word-play-btn:active {
            transform: scale(0.95);
        }

        .wrong-word-fav-btn {
            background: #28a745;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s linear;
        }

        .wrong-word-fav-btn:active {
            transform: scale(0.95);
        }

        .wrong-word-fav-btn i {
            color: white;
            font-size: 1.1rem;
        }

        .game-complete {
            text-align: center;
            padding: 20px;
        }

        .final-score {
            font-size: 1.3rem;
            margin: 15px 0;
        }

        .repeat-btn,
        .back-btn {
            background: #ffaa33;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
        }

        .repeat-btn {
            background: #4caf50;
            color: white;
        }

        /* ===== 启动遮罩层样式 ===== */
        #startOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        #startOverlay h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.3);
        }

        #startOverlay .subtitle {
            font-size: 1.2rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        #startBtn {
            background: #ff6b6b;
            border: none;
            padding: 16px 48px;
            font-size: 1.8rem;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 0 #c04e4e;
            transition: 0.05s linear;
        }

        #startBtn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #c04e4e;
        }

        #startOverlay .tip {
            margin-top: 40px;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .spelling-score-board {
                gap: 15px;
                flex-wrap: wrap;
            }

            .spelling-question {
                padding: 20px;
            }

            .spelling-question img {
                width: 100px;
                height: 100px;
            }

            .spelling-word {
                font-size: 1.8rem;
            }

            #startOverlay h1 {
                font-size: 2rem;
            }

            #startBtn {
                font-size: 1.3rem;
                padding: 12px 32px;
            }
        }
    </style>
</head>

<body>

    <!-- ===== 启动遮罩层 ===== -->
    <div id="startOverlay">
        <h1>✏️ Spelling Challenge</h1>
        <div class="subtitle">📝 补全元音 · 拼出单词</div>
        <button id="startBtn">🔊 开始拼写考试</button>

        <!-- ===== 重点复习单词按钮 ===== -->
        <div style="margin-top: 20px; width: 90%; max-width: 400px;">
            <button id="toggleFocusBtn" style="
                background: rgba(255, 193, 7, 0.2);
                border: 1px solid rgba(255, 193, 7, 0.4);
                color: #ffd54f;
                padding: 8px 20px;
                border-radius: 30px;
                cursor: pointer;
                font-size: 0.9rem;
                font-family: inherit;
                transition: all 0.3s;
                width: 100%;
            ">
                📌 查看需要重点复习的单词
            </button>
            <div id="focusWordsContainer" style="
                display: none;
                margin-top: 12px;
                background: rgba(0, 0, 0, 0.4);
                border-radius: 16px;
                padding: 14px 18px;
                text-align: left;
                max-height: 200px;
                overflow-y: auto;
                color: #fff;
            ">
                <!-- 由 JS 动态渲染 -->
            </div>
        </div>
        <!-- ===== 重点复习单词按钮结束 ===== -->

        <div class="tip">💡 点击按钮开始拼写挑战</div>
    </div>

    <!-- ===== 游戏主容器 ===== -->
    <div class="container" id="gameContainer" style="display: none;">
        <header>
            <h1><i class="fas fa-pencil-alt"></i> Spelling Mode <i class="fas fa-pencil-alt"></i></h1>
            <p class="subtitle">Fill in the missing vowels to spell the word!</p>
        </header>

        <div id="scoreArea" class="spelling-score-board">
            <div class="spelling-score-item">
                <span class="spelling-score-label">Correct:</span>
                <span id="correctCount" class="spelling-score-value correct">0</span>
            </div>
            <div class="spelling-score-item">
                <span class="spelling-score-label">Wrong:</span>
                <span id="wrongCount" class="spelling-score-value wrong">0</span>
            </div>
            <div class="spelling-score-item">
                <span class="spelling-score-label">Score:</span>
                <span id="totalScore" class="spelling-score-value score">0</span>
            </div>
            <div class="spelling-score-item">
                <span class="spelling-score-label">Progress:</span>
                <span id="progressCount" class="spelling-score-value">0/25</span>
            </div>
        </div>

        <div class="progress-bar">
            <div id="progressFill" class="progress-fill" style="width: 0%"></div>
        </div>

        <div id="roundInfo" class="spelling-round-info">Question 1: Spell the word</div>

        <div id="spellingContainer" class="spelling-container">
            <!-- Question will be generated by JavaScript -->
        </div>

        <div style="text-align:center; margin-top:20px;">
            <button id="backBtn" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back
            </button>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="wordData.js"></script>
    <script src="wordlistConfig.js"></script>
    <script src="wordlist.js"></script>
    <script src="spelling.js"></script>
</body>

</html>
